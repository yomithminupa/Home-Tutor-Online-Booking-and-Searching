spring.application.name=Home Tutor Search and Booking System
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
server.port=8080

# Default database: embedded H2. This runs immediately without installing MySQL.
spring.datasource.url=jdbc:h2:file:./database/home_tutor_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sliit
spring.datasource.password=sliitdb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# MySQL option:
# 1. Create a database named home_tutor_db in MySQL.
# 2. Replace the H2 datasource settings above with these lines.
# spring.datasource.url=jdbc:mysql://localhost:3306/home_tutor_db
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_mysql_password
